version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: collateral-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collateral}
      POSTGRES_USER: ${POSTGRES_USER:-collateral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collateral}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collateral-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-collateral}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-collateral}
      DB_SSL: "false"
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: collateral-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 如需 HTTPS，取消以下注释并挂载证书
      # - ./docker/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      # - "443:443"
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local
